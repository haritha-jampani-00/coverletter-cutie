services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8001
    ports:
      - "3001:3000"
    depends_on:
      - backend
